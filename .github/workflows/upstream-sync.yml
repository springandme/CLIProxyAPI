name: upstream-sync

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    env:
      SYNC_BRANCH: sync/upstream-main
      PR_TITLE: "chore(sync): merge upstream main"
      PR_BODY: |
        Automated sync PR that merges `upstream/main` into this fork's `main`.
        If conflicts occur, this workflow fails without touching `main`.
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure upstream remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/router-for-me/CLIProxyAPI.git
          else
            git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          fi

      - name: Fetch remotes
        run: |
          git fetch origin main
          git fetch upstream main

      - name: Merge upstream/main into sync branch
        id: merge
        run: |
          git checkout -B "$SYNC_BRANCH" origin/main
          git merge --no-edit upstream/main

      - name: Check for effective changes
        id: diff
        run: |
          if git diff --quiet origin/main...HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Validate PR token
        if: steps.diff.outputs.has_changes == 'true'
        env:
          UPSTREAM_SYNC_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN }}
        run: |
          if [ -z "$UPSTREAM_SYNC_TOKEN" ]; then
            echo "::error::Missing repository secret UPSTREAM_SYNC_TOKEN. Configure a fine-grained PAT with Contents:write and Pull requests:write."
            exit 1
          fi

      - name: Create or update PR
        if: steps.diff.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          head_ref="${GITHUB_REPOSITORY_OWNER}:${SYNC_BRANCH}"
          pr_number="$(gh api "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main&head=${head_ref}" --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            pr_number="$(gh api "repos/${GITHUB_REPOSITORY}/pulls" \
              --method POST \
              -f title="$PR_TITLE" \
              -f head="$SYNC_BRANCH" \
              -f base="main" \
              -f body="$PR_BODY" \
              --jq '.number')"
          else
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" \
              --method PATCH \
              -f title="$PR_TITLE" \
              -f body="$PR_BODY" >/dev/null
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge when allowed
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN }}
        run: |
          pr_number="${{ steps.pr.outputs.pr_number }}"
          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            gh pr merge "$pr_number" --auto --merge || true
          fi
