name: upstream-sync

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    env:
      SYNC_BRANCH: sync/upstream-main
      PR_TITLE: "chore(sync): merge upstream main"
      PR_BODY: |
        Automated sync PR that merges `upstream/main` into this fork's `main`.
        If conflicts occur, this workflow fails without touching `main`.
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure upstream remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/router-for-me/CLIProxyAPI.git
          else
            git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          fi

      - name: Fetch remotes
        run: |
          git fetch origin main
          git fetch upstream main

      - name: Merge upstream/main into sync branch
        id: merge
        run: |
          git checkout -B "$SYNC_BRANCH" origin/main
          git merge --no-edit upstream/main

      - name: Check for effective changes
        id: diff
        run: |
          if git diff --quiet origin/main...HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update PR
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number="$(gh pr list --state open --base main --head "$SYNC_BRANCH" --json number --jq '.[0].number')"
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            gh pr create \
              --base main \
              --head "$SYNC_BRANCH" \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
            pr_number="$(gh pr list --state open --base main --head "$SYNC_BRANCH" --json number --jq '.[0].number')"
          else
            gh pr edit "$pr_number" --title "$PR_TITLE" --body "$PR_BODY"
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge when allowed
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number="$(gh pr list --state open --base main --head "$SYNC_BRANCH" --json number --jq '.[0].number')"
          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            gh pr merge "$pr_number" --auto --merge || true
          fi
